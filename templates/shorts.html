<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{{ short.sarlavha }} | Kinotop Shorts</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .short-container {
            max-width: 400px;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: black;
        }
        video {
            width: 100%;
            height: 80vh;
            object-fit: contain;
        }
        .info {
            color: white;
            padding: 15px;
            text-align: center;
        }
        .close-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            text-decoration: none;
            background: rgba(0,0,0,0.5);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <a href="/" class="close-btn">✕</a>
    <div class="short-container">
        <video controls autoplay loop>
            <source src="/static/uploads/shorts/{{ short.fayl_nomi }}" type="video/mp4">
        </video>
        <div class="info">
            <h3>{{ short.sarlavha }}</h3>
            <p>{{ short.tafsilot or '' }}</p>
        </div>
    </div>
</body>
</html>
