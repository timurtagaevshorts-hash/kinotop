cat > admin.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; text-align: center; }
        input { padding: 12px; width: 100%; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; }
        .error { color: #ff6b6b; margin-bottom: 20px; }
    </style>
</head>
<body>
{% if not login %}
    <div class="card">
        <h1>🔐 Admin Panel</h1>
        {% if xato %}<div class="error">{{ xato }}</div>{% endif %}
        <form method="POST">
            <input type="password" name="parol" placeholder="Parol" required>
            <button type="submit">Kirish</button>
        </form>
    </div>
{% else %}
    <div class="card">
        <h1>✅ Admin Panel</h1>
        <p>Xush kelibsiz!</p>
        <p>Jami filmlar: {{ total_films|default(0) }}</p>
        <p>Jami shortslar: {{ total_shorts|default(0) }}</p>
        <a href="/admin/logout" style="color: #667eea;">Chiqish</a>
        <br><br>
        <a href="/" style="color: #667eea;">Bosh sahifa</a>
    </div>
{% endif %}
</body>
</html>
EOF
