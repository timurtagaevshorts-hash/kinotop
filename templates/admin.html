<!-- ADD FILM PAGE -->
<div id="add-film-page" style="display: none;">
    <div class="card">
        <div class="card-title">
            <i class="fas fa-link"></i>
            <span>Yangi film qo'shish (URL orqali)</span>
        </div>
        <form method="POST" action="/admin/film" enctype="multipart/form-data">
            <div class="form-row">
                <div class="form-group">
                    <label>Film kodi (4 xonali) *</label>
                    <input type="text" name="kod" placeholder="Masalan: 1234" maxlength="4" required>
                </div>
                <div class="form-group">
                    <label>Film nomi *</label>
                    <input type="text" name="nomi" placeholder="Film nomi" required>
                </div>
            </div>
            <div class="form-group">
                <label>Video URL *</label>
                <input type="text" name="video_url" placeholder="https://youtu.be/... yoki https://vk.com/video...">
                <small>YouTube, VK Video, UzMovi, Instagram, Vimeo, DailyMotion qo'llab-quvvatlanadi</small>
            </div>
            <div class="form-group">
                <label>Haqida</label>
                <textarea name="tafsilot" rows="3" placeholder="Film haqida ma'lumot..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Yil</label>
                    <input type="text" name="yil" placeholder="2024">
                </div>
                <div class="form-group">
                    <label>Janr</label>
                    <input type="text" name="janr" placeholder="Jangari, Fantastika">
                </div>
            </div>
            <div class="form-group">
                <label>Poster rasm</label>
                <input type="file" name="rasm" accept="image/*" class="file-input">
            </div>
            <button type="submit" class="btn btn-primary">📤 Film yuklash</button>
        </form>
    </div>
</div>

<!-- ADD SHORT PAGE -->
<div id="add-short-page" style="display: none;">
    <div class="card">
        <div class="card-title">
            <i class="fas fa-link"></i>
            <span>Yangi Shorts qo'shish (URL orqali)</span>
        </div>
        <form method="POST" action="/admin/shorts" enctype="multipart/form-data">
            <div class="form-group">
                <label>Shorts sarlavhasi *</label>
                <input type="text" name="sarlavha" placeholder="Sarlavha" required>
            </div>
            <div class="form-group">
                <label>Video URL *</label>
                <input type="text" name="video_url" placeholder="https://youtube.com/shorts/... yoki https://instagram.com/reel/...">
                <small>YouTube Shorts, Instagram Reel, TikTok qo'llab-quvvatlanadi</small>
            </div>
            <div class="form-group">
                <label>Qisqacha ma'lumot</label>
                <textarea name="tafsilot" rows="2" placeholder="Ma'lumot..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">📤 Shorts yuklash</button>
        </form>
    </div>
</div>
