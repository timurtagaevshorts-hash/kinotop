<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Shorts</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#000000">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

        /* PRELOADER */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .preloader.hide {
            opacity: 0;
            visibility: hidden;
        }

        .preloader-content {
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }

        .preloader-logo {
            font-size: 5rem;
            animation: bounce 1s ease infinite;
        }

        .preloader-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a8b2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* SHORTS CONTAINER */
        .shorts-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            background: #000;
            -webkit-overflow-scrolling: touch;
        }

        .shorts-container::-webkit-scrollbar { display: none; }

        .short-video {
            position: relative;
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .short-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .short-info {
            position: absolute;
            bottom: 100px;
            left: 16px;
            right: 80px;
            z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            padding: 20px 15px;
            border-radius: 15px;
        }

        .short-title {
            color: white;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .short-desc {
            color: rgba(255,255,255,0.8);
            font-size: 0.8rem;
        }

        .overlay-buttons {
            position: absolute;
            right: 12px;
            bottom: 100px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .overlay-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .download-short {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* CODE BAR */
        .code-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .code-button {
            width: 100%;
            padding: 16px 20px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .code-button-left { display: flex; align-items: center; gap: 12px; }
        .code-icon { background: linear-gradient(135deg, #667eea, #764ba2); width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .code-text h4 { color: white; font-size: 0.95rem; font-weight: 600; }
        .code-text p { color: rgba(255,255,255,0.5); font-size: 0.7rem; }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show { display: flex; }

        .modal-container {
            width: 90%;
            max-width: 400px;
            background: #1a1a2e;
            border-radius: 20px;
            overflow: hidden;
        }

        .modal-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            text-align: center;
        }

        .modal-header h3 { color: white; font-size: 1.3rem; }

        .modal-body { padding: 25px 20px; }

        .code-display {
            background: #0f0f1a;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .code-display span { font-size: 2rem; letter-spacing: 8px; color: white; font-family: monospace; }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .numpad-btn {
            background: #0f0f1a;
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 12px;
            padding: 18px;
            font-size: 1.5rem;
            color: white;
            text-align: center;
            cursor: pointer;
        }

        .numpad-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .action-btn {
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
        }

        .action-btn.clear { background: #dc3545; color: white; }
        .action-btn.backspace { background: #ffc107; color: #333; }

        .watch-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .film-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .film-loading.show {
            visibility: visible;
            opacity: 1;
        }

        .film-loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .logo {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .admin-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="preloader" id="preloader">
    <div class="preloader-content">
        <div class="preloader-logo">🎬</div>
        <div class="preloader-title">KINOTOP</div>
        <button class="start-btn" id="startBtn">🎥 Boshlash</button>
    </div>
</div>

<div class="film-loading" id="filmLoading">
    <div class="film-loading-spinner"></div>
    <div style="color: white;">Kino qidirilmoqda...</div>
</div>

<div class="logo">🎬 KINOTOP</div>
<a href="/admin" class="admin-btn">🔐</a>

<div class="shorts-container" id="shortsContainer" style="display: none;">
    {% if shorts %}
        {% for short in shorts %}
        <div class="short-video" data-id="{{ short.id }}">
            <video preload="auto" playsinline muted loop>
                <source src="/stream-shorts/{{ short.id }}" type="video/mp4">
            </video>
            <div class="short-info">
                <div class="short-title">{{ short.sarlavha }}</div>
                <div class="short-desc">{{ short.tafsilot or 'Qiziqarli video' }}</div>
            </div>
            <div class="overlay-buttons">
                <div class="overlay-btn sound-btn" data-id="{{ short.id }}">🔇</div>
                <div class="overlay-btn like-btn">❤️</div>
                <div class="download-short" data-id="{{ short.id }}" data-sarlavha="{{ short.sarlavha }}">📥</div>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div style="color:white; display:flex; align-items:center; justify-content:center; height:100vh;">
            <p>📱 Hozircha shorts yo'q</p>
        </div>
    {% endif %}
</div>

<div class="code-bar" id="codeBar">
    <button class="code-button" id="openModalBtn">
        <div class="code-button-left">
            <div class="code-icon">🎬</div>
            <div class="code-text">
                <h4> BU YERNI BOS va film ko'ring </h4>
                <p>Top kinolar</p>
            </div>
        </div>
        <div class="code-arrow">▲</div>
    </button>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3>🎬 Film kodi</h3>
        </div>
        <div class="modal-body">
            <div class="code-display">
                <span id="codeDisplay">____</span>
            </div>
            <div class="numpad">
                <div class="numpad-btn" data-value="1">1</div>
                <div class="numpad-btn" data-value="2">2</div>
                <div class="numpad-btn" data-value="3">3</div>
                <div class="numpad-btn" data-value="4">4</div>
                <div class="numpad-btn" data-value="5">5</div>
                <div class="numpad-btn" data-value="6">6</div>
                <div class="numpad-btn" data-value="7">7</div>
                <div class="numpad-btn" data-value="8">8</div>
                <div class="numpad-btn" data-value="9">9</div>
                <div class="numpad-btn" data-value=""></div>
                <div class="numpad-btn" data-value="0">0</div>
                <div class="numpad-btn" data-value=""></div>
            </div>
            <div class="numpad-actions">
                <div class="action-btn clear" id="clearBtn">O'chirish</div>
                <div class="action-btn backspace" id="backspaceBtn">⌫</div>
            </div>
            <button class="watch-submit" id="watchSubmitBtn">🎬 Tomosha qilish</button>
        </div>
    </div>
</div>

<script>
    // PRELOADER
    const preloader = document.getElementById('preloader');
    const startBtn = document.getElementById('startBtn');
    const shortsContainer = document.getElementById('shortsContainer');
    let allVideos = [];

    startBtn.addEventListener('click', () => {
        preloader.classList.add('hide');
        shortsContainer.style.display = 'block';
        setTimeout(() => {
            if (allVideos.length > 0) playVideo(0);
        }, 100);
    });

    function getAllVideos() {
        allVideos = Array.from(document.querySelectorAll('.short-video'));
    }

    let currentIndex = 0;
    let currentVideo = null;

    function playVideo(index) {
        allVideos.forEach((item, i) => {
            const video = item.querySelector('video');
            video.pause();
            video.muted = true;
            if (i === index) {
                video.muted = false;
                video.play().catch(e => console.log());
                currentVideo = video;
                const soundBtn = item.querySelector('.sound-btn');
                if (soundBtn) soundBtn.innerHTML = '🔊';
            } else {
                const soundBtn = item.querySelector('.sound-btn');
                if (soundBtn) soundBtn.innerHTML = '🔇';
            }
        });
        currentIndex = index;
    }

    function getCurrentIndex() {
        const scrollTop = shortsContainer.scrollTop;
        const itemHeight = window.innerHeight;
        return Math.round(scrollTop / itemHeight);
    }

    let scrollTimeout;
    shortsContainer.addEventListener('scroll', () => {
        if (scrollTimeout) clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
            const newIndex = getCurrentIndex();
            if (newIndex !== currentIndex && newIndex >= 0 && newIndex < allVideos.length) {
                playVideo(newIndex);
            }
        }, 50);
    });

    function toggleSound(btn) {
        const parent = btn.closest('.short-video');
        const video = parent.querySelector('video');
        if (video) {
            video.muted = !video.muted;
            btn.innerHTML = video.muted ? '🔇' : '🔊';
        }
    }

    function likeVideo(btn) {
        btn.style.transform = 'scale(1.2)';
        setTimeout(() => btn.style.transform = 'scale(1)', 200);
        btn.innerHTML = '❤️';
        setTimeout(() => btn.innerHTML = '❤️', 1000);
    }

    function downloadShort(btn) {
        const shortId = btn.getAttribute('data-id');
        const sarlavha = btn.getAttribute('data-sarlavha');
        const link = document.createElement('a');
        link.href = `/download-shorts/${shortId}`;
        link.download = `${sarlavha}.mp4`;
        link.click();
        
        btn.style.transform = 'scale(1.2)';
        setTimeout(() => btn.style.transform = 'scale(1)', 200);
    }

    // KOD KIRITISH
    let currentCode = '';
    const maxCodeLength = 4;
    const codeDisplay = document.getElementById('codeDisplay');
    const modalOverlay = document.getElementById('modalOverlay');
    const codeBar = document.getElementById('codeBar');
    const filmLoading = document.getElementById('filmLoading');

    function updateDisplay() {
        codeDisplay.textContent = currentCode.padEnd(maxCodeLength, '_');
    }

    function addDigit(d) {
        if (currentCode.length < maxCodeLength) {
            currentCode += d;
            updateDisplay();
        }
    }

    function clearCode() { currentCode = ''; updateDisplay(); }
    function backspace() { currentCode = currentCode.slice(0, -1); updateDisplay(); }

    function submitCode() {
        if (currentCode.length !== maxCodeLength) {
            alert(' kod kiriting!');
            return;
        }
        filmLoading.classList.add('show');
        fetch(`/api/check/${currentCode}`)
            .then(res => res.json())
            .then(data => {
                if (data.exists) {
                    window.location.href = `/film/${currentCode}`;
                } else {
                    filmLoading.classList.remove('show');
                    alert('Bunday kod topilmadi!');
                }
            })
            .catch(() => {
                filmLoading.classList.remove('show');
                alert('Xatolik!');
            });
    }

    document.querySelectorAll('.numpad-btn').forEach(btn => {
        const val = btn.getAttribute('data-value');
        if (val && val.trim()) btn.addEventListener('click', () => addDigit(val));
    });
    document.getElementById('clearBtn').addEventListener('click', clearCode);
    document.getElementById('backspaceBtn').addEventListener('click', backspace);
    document.getElementById('watchSubmitBtn').addEventListener('click', submitCode);
    document.getElementById('openModalBtn').addEventListener('click', () => {
        modalOverlay.classList.add('show');
        codeBar.style.transform = 'translateY(100%)';
    });

    const closeModalBtn = document.getElementById('closeModalBtn');
    if (closeModalBtn) {
        closeModalBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('show');
            codeBar.style.transform = 'translateY(0)';
            clearCode();
        });
    }

    window.addEventListener('load', () => {
        getAllVideos();
        document.querySelectorAll('.sound-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); toggleSound(btn); });
        });
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); likeVideo(btn); });
        });
        document.querySelectorAll('.download-short').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); downloadShort(btn); });
        });
    });
</script>
</body>
</html>
