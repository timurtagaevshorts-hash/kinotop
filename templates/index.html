<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Shorts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

        .shorts-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            background: #000;
            -webkit-overflow-scrolling: touch;
        }

        .shorts-container::-webkit-scrollbar {
            display: none;
        }

        .short-video {
            position: relative;
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .short-video video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .short-info {
            position: absolute;
            bottom: 100px;
            left: 16px;
            right: 80px;
            z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
            padding: 20px 15px;
            border-radius: 15px;
        }

        .short-title {
            color: white;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .short-desc {
            color: rgba(255,255,255,0.8);
            font-size: 0.8rem;
            text-shadow: 0 1px 1px rgba(0,0,0,0.5);
        }

        .overlay-buttons {
            position: absolute;
            right: 12px;
            bottom: 100px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .overlay-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .overlay-btn:active {
            transform: scale(0.9);
        }

        /* FLOATING CODE INPUT */
        .code-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-top: 2px solid #667eea;
            z-index: 100;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        .code-bar.hidden {
            transform: translateY(100%);
        }

        .code-button {
            width: 100%;
            padding: 16px 20px;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .code-button-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .code-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .code-text h4 {
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .code-text p {
            color: rgba(255,255,255,0.5);
            font-size: 0.7rem;
        }

        /* MODAL OVERLAY */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-container {
            width: 90%;
            max-width: 400px;
            background: #1a1a2e;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(102,126,234,0.3);
        }

        .modal-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            text-align: center;
        }

        .modal-header h3 {
            color: white;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .modal-body {
            padding: 25px 20px;
        }

        .code-display {
            background: #0f0f1a;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(102,126,234,0.3);
        }

        .code-display span {
            font-size: 1.8rem;
            letter-spacing: 4px;
            color: white;
            font-weight: 600;
            font-family: monospace;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .numpad-btn {
            background: #0f0f1a;
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 12px;
            padding: 18px;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .numpad-btn:active {
            background: #667eea;
            transform: scale(0.95);
        }

        .numpad-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .action-btn {
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }

        .action-btn.clear {
            background: #dc3545;
            color: white;
        }

        .action-btn.backspace {
            background: #ffc107;
            color: #333;
        }

        .watch-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .logo {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }

        .logo span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="logo">
    <span>🎬 KINOTOP</span>
</div>

<a href="/admin" class="admin-btn">🔐</a>

<div class="shorts-container" id="shortsContainer">
    {% if shorts %}
        {% for short in shorts %}
        <div class="short-video" data-id="{{ short.id }}" data-index="{{ loop.index0 }}">
            <video preload="auto" playsinline webkit-playsinline muted loop>
                <source src="/stream-shorts/{{ short.id }}" type="video/mp4">
            </video>
            <div class="short-info">
                <div class="short-title">{{ short.sarlavha }}</div>
                <div class="short-desc">{{ short.tafsilot or 'Qiziqarli video' }}</div>
            </div>
            <div class="overlay-buttons">
                <div class="overlay-btn sound-btn" data-id="{{ short.id }}">
                    🔇
                </div>
                <div class="overlay-btn like-btn">
                    ❤️
                </div>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div class="no-shorts">
            <p>📱 Hozircha shorts videolar yo'q</p>
        </div>
    {% endif %}
</div>

<div class="code-bar" id="codeBar">
    <button class="code-button" id="openModalBtn">
        <div class="code-button-left">
            <div class="code-icon">🎬</div>
            <div class="code-text">
                <h4>Film kodini kiriting</h4>
                <p>To'liq sifatda tomosha qiling</p>
            </div>
        </div>
        <div class="code-arrow">▲</div>
    </button>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-close" id="closeModalBtn">✕</div>
    <div class="modal-container">
        <div class="modal-header">
            <h3>🎬 Film kodini kiriting</h3>
            <p>Kodni raqamlar orqali yozing</p>
        </div>
        <div class="modal-body">
            <div class="code-display">
                <span id="codeDisplay">______</span>
            </div>
            <div class="numpad" id="numpad">
                <div class="numpad-btn" data-value="1">1</div>
                <div class="numpad-btn" data-value="2">2</div>
                <div class="numpad-btn" data-value="3">3</div>
                <div class="numpad-btn" data-value="4">4</div>
                <div class="numpad-btn" data-value="5">5</div>
                <div class="numpad-btn" data-value="6">6</div>
                <div class="numpad-btn" data-value="7">7</div>
                <div class="numpad-btn" data-value="8">8</div>
                <div class="numpad-btn" data-value="9">9</div>
                <div class="numpad-btn" data-value=""></div>
                <div class="numpad-btn" data-value="0">0</div>
                <div class="numpad-btn" data-value=""></div>
            </div>
            <div class="numpad-actions">
                <div class="action-btn clear" id="clearBtn">O'chirish</div>
                <div class="action-btn backspace" id="backspaceBtn">⌫</div>
            </div>
            <button class="watch-submit" id="watchSubmitBtn">🎬 Tomosha qilish</button>
        </div>
    </div>
</div>

<script>
    // ============ ULTRA TEZ SHORTS PLAYER ============
    const shortsContainer = document.getElementById('shortsContainer');
    const allVideos = document.querySelectorAll('.short-video');
    let currentIndex = 0;
    let currentVideo = null;
    let preloadedCount = 0;
    const PRELOAD_COUNT = 3; // Oldindan 3 ta video yuklash

    // Barcha videolarni oldindan yuklash (fonda)
    function preloadAllVideos() {
        allVideos.forEach((item, idx) => {
            const video = item.querySelector('video');
            if (video) {
                video.load();
                // Fonda yuklash
                if (idx > 0) {
                    video.preload = 'auto';
                }
            }
        });
    }

    // Faqat ko'rinayotgan videoni o'ynatish
    function playCurrentVideoOnly() {
        // Barcha videolarni to'xtatish va ovozni o'chirish
        allVideos.forEach((item) => {
            const video = item.querySelector('video');
            const soundBtn = item.querySelector('.sound-btn');
            if (video) {
                video.pause();
                video.muted = true;
                video.currentTime = 0;
            }
            if (soundBtn) soundBtn.innerHTML = '🔇';
        });
        
        // Hozirgi videoni o'ynatish
        const currentItem = allVideos[currentIndex];
        if (currentItem) {
            currentVideo = currentItem.querySelector('video');
            const soundBtn = currentItem.querySelector('.sound-btn');
            
            if (currentVideo) {
                currentVideo.muted = false;
                currentVideo.play().then(() => {
                    if (soundBtn) soundBtn.innerHTML = '🔊';
                }).catch(e => console.log('Play error:', e));
            }
        }
        
        // Keyingi videolarni oldindan yuklash
        preloadNextVideos();
    }

    // Keyingi videolarni oldindan yuklash
    function preloadNextVideos() {
        for (let i = 1; i <= PRELOAD_COUNT; i++) {
            const nextIndex = currentIndex + i;
            if (nextIndex < allVideos.length) {
                const nextVideo = allVideos[nextIndex].querySelector('video');
                if (nextVideo && nextVideo.readyState < 2) {
                    nextVideo.load();
                }
            }
        }
    }

    // Scroll bo'yicha indeks aniqlash
    function getCurrentIndex() {
        const scrollTop = shortsContainer.scrollTop;
        const itemHeight = window.innerHeight;
        return Math.round(scrollTop / itemHeight);
    }

    // Ovozni yoqish/o'chirish
    function toggleSound(btn, videoId) {
        const parent = btn.closest('.short-video');
        const video = parent.querySelector('video');
        if (video) {
            if (video.muted) {
                video.muted = false;
                btn.innerHTML = '🔊';
            } else {
                video.muted = true;
                btn.innerHTML = '🔇';
            }
        }
    }

    // Like animatsiyasi
    function likeVideo(btn) {
        btn.style.transform = 'scale(1.2)';
        setTimeout(() => {
            btn.style.transform = 'scale(1)';
        }, 200);
        btn.innerHTML = '❤️';
        setTimeout(() => {
            btn.innerHTML = '❤️';
        }, 1000);
    }

    // Scroll event - tez va silliq
    let scrollTimeout;
    shortsContainer.addEventListener('scroll', () => {
        if (scrollTimeout) clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
            const newIndex = getCurrentIndex();
            if (newIndex !== currentIndex && newIndex >= 0 && newIndex < allVideos.length) {
                currentIndex = newIndex;
                playCurrentVideoOnly();
            }
        }, 30);
    });

    // Touch event (mobil uchun)
    let touchStartY = 0;
    shortsContainer.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
    });
    
    shortsContainer.addEventListener('touchend', (e) => {
        const touchEndY = e.changedTouches[0].clientY;
        const diff = touchStartY - touchEndY;
        if (Math.abs(diff) > 30) {
            setTimeout(() => {
                const newIndex = getCurrentIndex();
                if (newIndex !== currentIndex) {
                    currentIndex = newIndex;
                    playCurrentVideoOnly();
                }
            }, 50);
        }
    });

    // Video tugaganda keyingisiga o'tish
    function setupVideoEnded() {
        allVideos.forEach((item, idx) => {
            const video = item.querySelector('video');
            if (video) {
                video.addEventListener('ended', () => {
                    if (idx === currentIndex && idx + 1 < allVideos.length) {
                        const nextElement = allVideos[idx + 1];
                        nextElement.scrollIntoView({ behavior: 'smooth' });
                        setTimeout(() => {
                            currentIndex = idx + 1;
                            playCurrentVideoOnly();
                        }, 200);
                    }
                });
            }
        });
    }

    // ============ KOD KIRITISH FUNKSIYALARI ============
    let currentCode = '';
    const maxCodeLength = 6;
    const codeDisplay = document.getElementById('codeDisplay');
    const modalOverlay = document.getElementById('modalOverlay');
    const codeBar = document.getElementById('codeBar');
    const openModalBtn = document.getElementById('openModalBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const clearBtn = document.getElementById('clearBtn');
    const backspaceBtn = document.getElementById('backspaceBtn');
    const watchSubmitBtn = document.getElementById('watchSubmitBtn');

    function updateDisplay() {
        const displayText = currentCode.padEnd(maxCodeLength, '_');
        codeDisplay.textContent = displayText;
    }

    function addDigit(digit) {
        if (currentCode.length < maxCodeLength) {
            currentCode += digit;
            updateDisplay();
        }
    }

    function clearCode() {
        currentCode = '';
        updateDisplay();
    }

    function backspace() {
        currentCode = currentCode.slice(0, -1);
        updateDisplay();
    }

    function submitCode() {
        if (currentCode.length === 0) {
            alert('Iltimos, film kodini kiriting!');
            return;
        }
        const kod = currentCode.toUpperCase();
        window.location.href = `/film/${kod}`;
    }

    // Numpad eventlari
    document.querySelectorAll('.numpad-btn').forEach(btn => {
        const value = btn.getAttribute('data-value');
        if (value && value.trim() !== '') {
            btn.addEventListener('click', () => addDigit(value));
        }
    });

    clearBtn.addEventListener('click', clearCode);
    backspaceBtn.addEventListener('click', backspace);
    watchSubmitBtn.addEventListener('click', submitCode);

    // Modal ochish/yopish
    openModalBtn.addEventListener('click', () => {
        modalOverlay.classList.add('show');
        codeBar.classList.add('hidden');
    });

    function closeModal() {
        modalOverlay.classList.remove('show');
        codeBar.classList.remove('hidden');
        clearCode();
    }

    closeModalBtn.addEventListener('click', closeModal);
    
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) {
            closeModal();
        }
    });

    // Klaviatura qo'llab-quvvatlash
    document.addEventListener('keydown', (e) => {
        if (!modalOverlay.classList.contains('show')) return;
        
        if (e.key >= '0' && e.key <= '9') {
            addDigit(e.key);
        } else if (e.key === 'Backspace') {
            backspace();
        } else if (e.key === 'Delete') {
            clearCode();
        } else if (e.key === 'Enter') {
            submitCode();
        } else if (e.key === 'Escape') {
            closeModal();
        }
    });

    // ============ BOSHLASH ============
    window.addEventListener('load', () => {
        // Barcha videolarni oldindan yuklash
        preloadAllVideos();
        
        // Ovoz tugmalariga event qo'shish
        document.querySelectorAll('.sound-btn').forEach(btn => {
            const videoId = btn.getAttribute('data-id');
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleSound(this, videoId);
            });
        });
        
        // Like tugmalariga event qo'shish
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                likeVideo(this);
            });
        });
        
        // Birinchi videoni o'ynatish
        setTimeout(() => {
            currentIndex = 0;
            playCurrentVideoOnly();
            setupVideoEnded();
        }, 100);
        
        // Qolgan videolarni fonda yuklash
        setTimeout(() => {
            for (let i = 1; i < allVideos.length; i++) {
                const video = allVideos[i].querySelector('video');
                if (video && video.readyState < 2) {
                    video.load();
                }
            }
        }, 1000);
    });

    // Backgroundda yuklash davom etsin
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
            if (currentVideo && currentVideo.paused) {
                currentVideo.play().catch(e => console.log());
            }
        }
    });
</script>

</body>
</html>
