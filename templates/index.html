<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Premium kinolar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            overflow-x: hidden;
            height: 100vh;
            position: fixed;
            width: 100%;
        }

        /* SHORTS SECTION - TikTok Style */
        .shorts-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            background: #000;
        }

        .short-video {
            position: relative;
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .short-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .short-info {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            color: white;
            z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            padding: 20px;
            border-radius: 15px;
        }

        .short-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .short-desc {
            font-size: 0.85rem;
            opacity: 0.9;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* OVERLAY BUTTONS */
        .overlay-buttons {
            position: absolute;
            right: 15px;
            bottom: 120px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .overlay-btn {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .overlay-btn:active {
            transform: scale(0.9);
        }

        /* FLOATING CODE INPUT - Asosiy element */
        .floating-input {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
        }

        .floating-input.expanded {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            z-index: 200;
        }

        .input-card {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .floating-input.expanded .input-card {
            border-radius: 30px;
            padding: 20px 25px;
            flex-direction: column;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
        }

        .input-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
        }

        .input-text {
            flex: 1;
        }

        .input-text h4 {
            color: white;
            font-size: 0.85rem;
            margin-bottom: 3px;
        }

        .input-text p {
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
        }

        .floating-input.expanded .input-text h4 {
            font-size: 1.2rem;
            text-align: center;
        }

        .floating-input.expanded .input-text p {
            text-align: center;
            font-size: 0.85rem;
        }

        /* Kod kiritish formasi (kengaytirilganda) */
        .code-form {
            display: none;
            width: 100%;
            margin-top: 15px;
        }

        .floating-input.expanded .code-form {
            display: block;
        }

        .code-input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
        }

        .code-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .watch-btn {
            width: 100%;
            margin-top: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .watch-btn:active {
            transform: scale(0.98);
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            background: rgba(255,255,255,0.2);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Logo */
        .logo {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .logo span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Admin button */
        .admin-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
        }

        /* Scrollbar yashirish */
        .shorts-container::-webkit-scrollbar {
            display: none;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 200;
            display: none;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* No shorts message */
        .no-shorts {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            background: linear-gradient(135deg, #0f0c29, #302b63);
        }

        .no-shorts p {
            font-size: 1.2rem;
            opacity: 0.7;
        }

        /* Animation */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="logo">
    <span>🎬 KINOTOP</span>
</div>

<a href="/admin" class="admin-btn">🔐</a>

<div class="loading" id="loading"></div>

<!-- SHORTS SECTION (TikTok Style) -->
<div class="shorts-container" id="shortsContainer">
    {% if shorts %}
        {% for short in shorts %}
        <div class="short-video" data-id="{{ short.id }}">
            <video preload="metadata" loop muted playsinline>
                <source src="/stream-shorts/{{ short.id }}" type="video/mp4">
            </video>
            <div class="short-info">
                <div class="short-title">{{ short.sarlavha }}</div>
                <div class="short-desc">{{ short.tafsilot or 'Qiziqarli video' }}</div>
            </div>
            <div class="overlay-buttons">
                <div class="overlay-btn" onclick="toggleMute(this)">
                    🔊
                </div>
                <div class="overlay-btn" onclick="likeVideo(this)">
                    ❤️
                </div>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div class="no-shorts">
            <p>📱 Hozircha shorts videolar yo'q<br>Admin panel orqali qo'shing</p>
        </div>
    {% endif %}
</div>

<!-- FLOATING CODE INPUT -->
<div class="floating-input" id="floatingInput" onclick="expandInput(event)">
    <div class="input-card">
        <div class="input-icon">
            🎬
        </div>
        <div class="input-text">
            <h4>Film kodini kiriting</h4>
            <p>To'liq sifatda tomosha qiling</p>
        </div>
        <div class="code-form" id="codeForm">
            <input type="text" class="code-input" id="filmKod" placeholder="Masalan: AVENGER001" autocomplete="off">
            <button class="watch-btn" onclick="watchFilm()">🎬 Tomosha qilish</button>
        </div>
        <div class="close-btn" id="closeBtn" onclick="closeInput(event)">✕</div>
    </div>
</div>

<script>
    // Video autoplay on scroll (TikTok style)
    const shortsContainer = document.getElementById('shortsContainer');
    const videos = document.querySelectorAll('.short-video video');
    let currentVideoIndex = 0;
    let isPlaying = false;

    function playVideo(index) {
        videos.forEach((video, i) => {
            video.pause();
            video.currentTime = 0;
        });
        if (videos[index]) {
            videos[index].play();
            videos[index].muted = false;
            currentVideoIndex = index;
            isPlaying = true;
        }
    }

    function pauseCurrent() {
        if (videos[currentVideoIndex]) {
            videos[currentVideoIndex].pause();
            isPlaying = false;
        }
    }

    // Scroll event
    shortsContainer.addEventListener('scroll', () => {
        const scrollTop = shortsContainer.scrollTop;
        const itemHeight = window.innerHeight;
        const newIndex = Math.round(scrollTop / itemHeight);
        
        if (newIndex !== currentVideoIndex && newIndex >= 0 && newIndex < videos.length) {
            playVideo(newIndex);
        }
    });

    // Touch events for better mobile experience
    let touchStartY = 0;
    shortsContainer.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
    });

    shortsContainer.addEventListener('touchend', (e) => {
        const touchEndY = e.changedTouches[0].clientY;
        const diff = touchStartY - touchEndY;
        if (Math.abs(diff) > 50) {
            // Scroll detected, play current video
            const scrollTop = shortsContainer.scrollTop;
            const itemHeight = window.innerHeight;
            const newIndex = Math.round(scrollTop / itemHeight);
            if (newIndex !== currentVideoIndex) {
                playVideo(newIndex);
            }
        }
    });

    // Start first video
    if (videos.length > 0) {
        setTimeout(() => {
            playVideo(0);
        }, 500);
    }

    // Mute/Unmute function
    function toggleMute(btn) {
        const video = btn.closest('.short-video').querySelector('video');
        if (video) {
            video.muted = !video.muted;
            btn.innerHTML = video.muted ? '🔇' : '🔊';
        }
    }

    // Like animation
    function likeVideo(btn) {
        btn.style.transform = 'scale(1.2)';
        setTimeout(() => {
            btn.style.transform = 'scale(1)';
        }, 200);
        btn.innerHTML = '❤️';
    }

    // ============ FLOATING INPUT LOGIC ============
    const floatingInput = document.getElementById('floatingInput');
    const codeForm = document.getElementById('codeForm');
    const closeBtn = document.getElementById('closeBtn');
    let isExpanded = false;

    function expandInput(event) {
        if (event.target.classList.contains('close-btn') || event.target === closeBtn) {
            return;
        }
        if (!isExpanded) {
            floatingInput.classList.add('expanded');
            isExpanded = true;
            setTimeout(() => {
                document.getElementById('filmKod').focus();
            }, 300);
        }
    }

    function closeInput(event) {
        event.stopPropagation();
        floatingInput.classList.remove('expanded');
        isExpanded = false;
        document.getElementById('filmKod').value = '';
    }

    function watchFilm() {
        const kod = document.getElementById('filmKod').value.trim().toUpperCase();
        if (!kod) {
            alert('Iltimos, film kodini kiriting!');
            return;
        }
        
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        
        // Check if film exists
        fetch(`/api/check/${kod}`)
            .then(response => {
                if (response.ok) {
                    window.location.href = `/film/${kod}`;
                } else {
                    alert('Bunday kodli film topilmadi!');
                    loading.style.display = 'none';
                }
            })
            .catch(() => {
                alert('Xatolik yuz berdi!');
                loading.style.display = 'none';
            });
    }

    // Enter key support
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && isExpanded) {
            watchFilm();
        }
    });

    // Background video playback
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            if (videos[currentVideoIndex]) {
                videos[currentVideoIndex].pause();
            }
        } else {
            if (videos[currentVideoIndex] && !videos[currentVideoIndex].paused === false) {
                videos[currentVideoIndex].play();
            }
        }
    });
</script>

</body>
</html>
