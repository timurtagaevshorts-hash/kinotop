<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ film.nomi }} | Kinotop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            position: fixed;
            width: 100%;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
            text-decoration: none;
        }
        .back-btn:active { background: rgba(255,255,255,0.2); }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
        }

        .video-wrapper {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .youtube-player {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .custom-fullscreen {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .custom-fullscreen:active { 
            transform: scale(0.95); 
            background: #667eea;
        }

        .info {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }
        .info h1 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: white;
        }
        .film-code {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 3px 10px;
            border-radius: 20px;
            color: white;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .description {
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
            z-index: 2000;
            transition: opacity 0.3s;
        }
        .loading-overlay.hide { opacity: 0; visibility: hidden; }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-text { color: white; font-size: 0.9rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .video-wrapper:fullscreen {
            width: 100%;
            height: 100%;
        }
        .video-wrapper:fullscreen .youtube-player {
            height: 100%;
        }

        @media (max-width: 768px) {
            .custom-fullscreen { width: 42px; height: 42px; font-size: 1.1rem; }
            .info h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">🎬 Video tayyorlanmoqda...</div>
</div>

<div class="header">
    <a href="/" class="logo">
        <i class="fas fa-film"></i>
        <span>KINOTOP</span>
    </a>
    <a href="/" class="back-btn">
        <i class="fas fa-arrow-left"></i> Chiqish
    </a>
</div>

<div class="container">
    <div class="video-wrapper" id="videoWrapper">
        <iframe 
            id="youtubeFrame"
            class="youtube-player"
            src="{{ film.embed_url }}&modestbranding=1&showinfo=0&controls=1&rel=0&iv_load_policy=3&fs=1&disablekb=0&hl=uz&playsinline=1"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
            allowfullscreen="true"
            webkitallowfullscreen="true"
            mozallowfullscreen="true">
        </iframe>
        
        <button class="custom-fullscreen" id="fullscreenBtn">
            <i class="fas fa-expand"></i>
        </button>
    </div>

    <div class="info">
        <h1>{{ film.nomi }}</h1>
        <div class="film-code">
            <i class="fas fa-key"></i> Kod: {{ film.kod }}
        </div>
        <div class="description">
            {{ film.tafsilot if film.tafsilot else "Bu film haqida ma'lumot yo'q" }}
        </div>
    </div>
</div>

<script>
    const loadingOverlay = document.getElementById('loadingOverlay');
    const videoWrapper = document.getElementById('videoWrapper');
    const youtubeFrame = document.getElementById('youtubeFrame');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    
    let playerReady = false;
    let player;

    // ============ YOUTUBE PLAYER API ============
    function loadYouTubeAPI() {
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }
    
    window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('youtubeFrame', {
            events: {
                'onReady': onPlayerReady,
                'onError': onPlayerError
            }
        });
    };
    
    function onPlayerReady(event) {
        playerReady = true;
        loadingOverlay.classList.add('hide');
        // Video avtomatik boshlansin
        event.target.playVideo();
    }
    
    function onPlayerError(event) {
        console.log('YouTube error:', event.data);
        loadingOverlay.classList.add('hide');
        // Agar YouTube API xato bersa, oddiy iframe ishlaydi
    }
    
    // ============ FULLSCREEN ============
    function enterFullscreen() {
        const elem = videoWrapper;
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
        }
    }
    
    fullscreenBtn.addEventListener('click', enterFullscreen);
    videoWrapper.addEventListener('dblclick', enterFullscreen);
    
    // ============ LOADING TIMEOUT ============
    setTimeout(() => {
        loadingOverlay.classList.add('hide');
    }, 3000);
    
    // ============ TELEGRAM WEB UCHUN MAXSUS ============
    function isTelegramWeb() {
        const ua = navigator.userAgent || '';
        return ua.includes('Telegram') && !ua.includes('Android') && !ua.includes('iPhone');
    }
    
    if (isTelegramWeb()) {
        // Telegram web da iframe ni to'g'ridan-to'g'ri ko'rsatish
        youtubeFrame.style.pointerEvents = 'auto';
    }
    
    // ============ KEYBOARD SHORTCUTS ============
    document.addEventListener('keydown', (e) => {
        if (e.code === 'KeyF') {
            e.preventDefault();
            enterFullscreen();
        }
        if (e.code === 'Escape') {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        }
    });
    
    // ============ YOUTUBE API ni ishga tushirish ============
    loadYouTubeAPI();
</script>
</body>
</html>
