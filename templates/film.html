<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let isFullScreen = false;

// ========== YOUTUBE PLAYER INIT ==========
function onYouTubeIframeAPIReady() {
    const film = {{ film | tojson | safe }};
    let videoUrl = film.video_url || film.embed_url;

    let videoId = "";

    if (videoUrl.includes("youtu.be/")) {
        videoId = videoUrl.split("youtu.be/")[1].split("?")[0];
    } 
    else if (videoUrl.includes("watch?v=")) {
        videoId = videoUrl.split("watch?v=")[1].split("&")[0];
    } 
    else if (videoUrl.includes("embed/")) {
        videoId = videoUrl.split("embed/")[1].split("?")[0];
    }

    player = new YT.Player("videoIframe", {
        videoId: videoId,
        playerVars: {
            autoplay: 1,
            controls: 0,
            rel: 0,
            modestbranding: 1,
            playsinline: 1
        },
        events: {
            onReady: () => {
                document.getElementById("filmLoading").classList.add("hide");
                updateProgress();
            },
            onStateChange: (e) => {
                if (e.data === YT.PlayerState.PLAYING) {
                    document.getElementById("playPauseBtn").innerHTML = '<i class="fas fa-pause"></i>';
                } else {
                    document.getElementById("playPauseBtn").innerHTML = '<i class="fas fa-play"></i>';
                }
            }
        }
    });
}

// ========== PLAY / PAUSE ==========
function togglePlayPause() {
    if (!player) return;

    const state = player.getPlayerState();

    if (state === YT.PlayerState.PLAYING) {
        player.pauseVideo();
    } else {
        player.playVideo();
    }
}

// ========== SEEK ==========
function seek(seconds) {
    if (!player) return;
    const current = player.getCurrentTime();
    player.seekTo(current + seconds, true);
}

// ========== FULLSCREEN ==========
function toggleFullScreen() {
    const el = document.getElementById("videoWrapper");

    if (!document.fullscreenElement) {
        el.requestFullscreen();
        isFullScreen = true;
    } else {
        document.exitFullscreen();
        isFullScreen = false;
    }
}

// ========== PROGRESS BAR ==========
function updateProgress() {
    if (!player) return;

    setInterval(() => {
        const duration = player.getDuration();
        const current = player.getCurrentTime();

        if (duration) {
            const percent = (current / duration) * 100;
            document.getElementById("progressFilled").style.width = percent + "%";

            document.getElementById("currentTime").innerText = formatTime(current);
            document.getElementById("duration").innerText = formatTime(duration);
        }
    }, 500);
}

// ========== TIME FORMAT ==========
function formatTime(sec) {
    sec = Math.floor(sec);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${s < 10 ? "0" + s : s}`;
}

// ========== CONTROLS ==========
document.getElementById("playPauseBtn").onclick = togglePlayPause;
document.getElementById("rewindBtn").onclick = () => seek(-10);
document.getElementById("forwardBtn").onclick = () => seek(10);
document.getElementById("fullscreenBtn").onclick = toggleFullScreen;

// progress click seek
document.getElementById("progressBar").onclick = (e) => {
    const rect = e.target.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    const time = player.getDuration() * percent;
    player.seekTo(time, true);
};

// back
document.getElementById("backBtn").onclick = () => {
    window.location.href = "/";
};
</script>
