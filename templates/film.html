<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Film tomosha qilish</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="theme-color" content="#667eea">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

        body:fullscreen {
            overflow: hidden !important;
        }

        .film-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: contain;
        }

        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .controls-overlay,
        .video-wrapper:active .controls-overlay,
        .controls-overlay.show {
            opacity: 1;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            pointer-events: auto;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .control-btn:active { transform: scale(0.95); }
        .play-pause-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .progress-container {
            padding: 0 10px;
            pointer-events: auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            position: relative;
        }

        .progress-buffered {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            width: 0%;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: white;
            font-size: 0.7rem;
            font-family: monospace;
        }

        .film-info {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 70px 20px 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .film-info,
        .film-info.show {
            opacity: 1;
        }

        .film-title {
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .film-desc {
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }

        .film-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .film-loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(220,53,69,0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 0.8rem;
            z-index: 200;
            transform: translateY(100px);
            transition: transform 0.3s ease;
        }

        .error-message.show {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .control-btn { width: 40px; height: 40px; font-size: 1rem; }
            .play-pause-btn { width: 50px; height: 50px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="film-loading" id="filmLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text">🎬 Film yuklanmoqda...</div>
</div>

<div class="film-container">
    <div class="back-btn" id="backBtn">
        <i class="fas fa-arrow-left"></i>
    </div>
    
    <div class="video-wrapper" id="videoWrapper">
        <iframe id="videoIframe" 
                allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                allowfullscreen="true">
        </iframe>
        
        <div class="controls-overlay" id="controlsOverlay">
            <div class="control-buttons">
                <div class="control-btn" id="rewindBtn">
                    <i class="fas fa-backward"></i>
                </div>
                <div class="control-btn play-pause-btn" id="playPauseBtn">
                    <i class="fas fa-play"></i>
                </div>
                <div class="control-btn" id="forwardBtn">
                    <i class="fas fa-forward"></i>
                </div>
                <div class="control-btn" id="fullscreenBtn">
                    <i class="fas fa-expand"></i>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-buffered" id="progressBuffered"></div>
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </div>
        
        <div class="film-info" id="filmInfo">
            <div class="film-title" id="filmTitle">Loading...</div>
            <div class="film-desc" id="filmDesc"></div>
        </div>
    </div>
</div>

<div class="error-message" id="errorMessage">
    <i class="fas fa-exclamation-triangle"></i> Video yuklashda xatolik
</div>

<script>
    // ============ TEZ KORINISH UCHUN OPTIMALLASHTIRILGAN KOD ============
    const filmData = {{ film | tojson | safe }};
    let player = null;
    let isPlaying = false;
    let controlsTimeout = null;
    let isFullScreen = false;
    let progressInterval = null;
    
    // Video ID ni tezda olish
    function extractVideoId(url) {
        if (!url) return null;
        
        // YouTube Shorts
        if (url.includes('/shorts/')) {
            const match = url.match(/\/shorts\/([a-zA-Z0-9_-]{11})/);
            if (match) return match[1];
        }
        // youtu.be format
        if (url.includes('youtu.be/')) {
            const match = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
            if (match) return match[1];
        }
        // youtube.com/watch
        if (url.includes('watch?v=')) {
            const match = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
            if (match) return match[1];
        }
        // youtube.com/embed
        if (url.includes('/embed/')) {
            const match = url.match(/\/embed\/([a-zA-Z0-9_-]{11})/);
            if (match) return match[1];
        }
        // To'g'ridan-to'g'ri ID
        if (url.match(/^[a-zA-Z0-9_-]{11}$/)) {
            return url;
        }
        return null;
    }
    
    // Videoni tezda yuklash
    function loadVideoFast() {
        const loading = document.getElementById('filmLoading');
        
        if (!filmData || !filmData.id) {
            loading.classList.add('hide');
            showError('Film ma\'lumotlari topilmadi!');
            setTimeout(() => window.location.href = '/', 2000);
            return;
        }
        
        document.getElementById('filmTitle').textContent = filmData.sarlavha || filmData.nomi || 'Film';
        document.getElementById('filmDesc').textContent = filmData.tafsilot || filmData.description || '';
        
        let videoUrl = filmData.video_url || filmData.embed_url;
        let videoId = extractVideoId(videoUrl);
        
        if (!videoId) {
            loading.classList.add('hide');
            showError('Video ID topilmadi!');
            return;
        }
        
        // To'g'ridan-to'g'ri iframe orqali yuklash (API kutmasdan)
        const iframe = document.getElementById('videoIframe');
        const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&controls=0&modestbranding=1&showinfo=0&rel=0&playsinline=1&enablejsapi=1&origin=${encodeURIComponent(window.location.origin)}`;
        
        iframe.src = embedUrl;
        
        // Loading ni yashirish
        setTimeout(() => {
            loading.classList.add('hide');
        }, 1000);
        
        // YouTube API orqali boshqaruv uchun
        loadYouTubeAPI(videoId);
        
        // Event listenerlar
        const wrapper = document.getElementById('videoWrapper');
        wrapper.addEventListener('mousemove', showControls);
        wrapper.addEventListener('click', showControls);
        wrapper.addEventListener('touchstart', showControls);
        wrapper.addEventListener('dblclick', (e) => {
            e.preventDefault();
            toggleFullScreen();
        });
    }
    
    // YouTube API ni yuklash
    function loadYouTubeAPI(videoId) {
        // Agar API allaqachon yuklangan bo'lsa
        if (window.YT && YT.Player) {
            initPlayer(videoId);
            return;
        }
        
        // API ni yuklash
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        
        window.onYouTubeIframeAPIReady = function() {
            initPlayer(videoId);
        };
    }
    
    function initPlayer(videoId) {
        const iframe = document.getElementById('videoIframe');
        
        player = new YT.Player(iframe, {
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange,
                'onError': onPlayerError
            }
        });
    }
    
    function onPlayerReady(event) {
        // Progress interval ni ishga tushirish
        if (progressInterval) clearInterval(progressInterval);
        progressInterval = setInterval(updateProgress, 1000);
        
        isPlaying = true;
        const playBtn = document.getElementById('playPauseBtn');
        if (playBtn) playBtn.innerHTML = '<i class="fas fa-pause"></i>';
    }
    
    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            isPlaying = true;
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
        } else if (event.data == YT.PlayerState.PAUSED) {
            isPlaying = false;
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
        } else if (event.data == YT.PlayerState.ENDED) {
            isPlaying = false;
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
        }
    }
    
    function onPlayerError(event) {
        console.log('Player error:', event.data);
        // Xatolik bo'lsa ham video ishlayveradi (iframe orqali)
    }
    
    function updateProgress() {
        if (!player || typeof player.getCurrentTime !== 'function') return;
        
        try {
            const currentTime = player.getCurrentTime();
            const duration = player.getDuration();
            
            if (duration && duration > 0) {
                const percent = (currentTime / duration) * 100;
                const filled = document.getElementById('progressFilled');
                if (filled) filled.style.width = percent + '%';
                
                document.getElementById('currentTime').textContent = formatTime(currentTime);
                document.getElementById('duration').textContent = formatTime(duration);
            }
            
            // Buffered qism
            if (player.getVideoLoadedFraction) {
                const buffered = player.getVideoLoadedFraction() * 100;
                const bufferedEl = document.getElementById('progressBuffered');
                if (bufferedEl) bufferedEl.style.width = buffered + '%';
            }
        } catch(e) {
            // API hali tayyor emas
        }
    }
    
    function formatTime(seconds) {
        if (isNaN(seconds) || !seconds) return '0:00';
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);
        
        if (hours > 0) {
            return `${hours}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        return `${minutes}:${secs.toString().padStart(2, '0')}`;
    }
    
    // ============ BOSHQARUV FUNKSIYALARI ============
    function showControls() {
        const controls = document.getElementById('controlsOverlay');
        const filmInfo = document.getElementById('filmInfo');
        controls.classList.add('show');
        filmInfo.classList.add('show');
        
        if (controlsTimeout) clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => {
            controls.classList.remove('show');
            filmInfo.classList.remove('show');
        }, 3000);
    }
    
    function togglePlayPause() {
        if (!player || typeof player.getPlayerState !== 'function') {
            // API hali tayyor bo'lmasa, iframe ni boshqarish
            const iframe = document.getElementById('videoIframe');
            const iframeSrc = iframe.src;
            if (iframeSrc.includes('autoplay=1')) {
                iframe.src = iframeSrc.replace('autoplay=1', 'autoplay=0');
            } else {
                iframe.src = iframeSrc.replace('autoplay=0', 'autoplay=1');
            }
            return;
        }
        
        const state = player.getPlayerState();
        if (state == YT.PlayerState.PLAYING) {
            player.pauseVideo();
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
            isPlaying = false;
        } else {
            player.playVideo();
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
            isPlaying = true;
        }
    }
    
    function seek(seconds) {
        if (!player || typeof player.getCurrentTime !== 'function') return;
        try {
            const currentTime = player.getCurrentTime();
            const newTime = currentTime + seconds;
            const duration = player.getDuration();
            if (newTime >= 0 && newTime <= duration) {
                player.seekTo(newTime, true);
            }
        } catch(e) {}
    }
    
    function seekToPercent(percent) {
        if (!player || typeof player.getDuration !== 'function') return;
        try {
            const duration = player.getDuration();
            if (duration > 0) {
                player.seekTo(duration * percent, true);
            }
        } catch(e) {}
    }
    
    function toggleFullScreen() {
        const wrapper = document.getElementById('videoWrapper');
        
        if (!isFullScreen) {
            if (wrapper.requestFullscreen) wrapper.requestFullscreen();
            else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
            else if (wrapper.msRequestFullscreen) wrapper.msRequestFullscreen();
            isFullScreen = true;
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
            isFullScreen = false;
        }
    }
    
    function handleFullScreenChange() {
        const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        const btn = document.getElementById('fullscreenBtn');
        if (btn) {
            btn.innerHTML = isFs ? '<i class="fas fa-compress"></i>' : '<i class="fas fa-expand"></i>';
            isFullScreen = isFs;
        }
    }
    
    function showError(message) {
        const errorMsg = document.getElementById('errorMessage');
        errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + message;
        errorMsg.classList.add('show');
        setTimeout(() => {
            errorMsg.classList.remove('show');
        }, 4000);
    }
    
    // ============ KEYBOARD CONTROLS ============
    document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Space' || e.key === 'k' || e.key === 'K') {
            e.preventDefault();
            togglePlayPause();
        }
        else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            seek(-10);
        }
        else if (e.key === 'ArrowRight') {
            e.preventDefault();
            seek(10);
        }
        else if (e.key === 'f' || e.key === 'F') {
            e.preventDefault();
            toggleFullScreen();
        }
        showControls();
    });
    
    // ============ EVENT LISTENERLAR ============
    document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
    document.getElementById('fullscreenBtn').addEventListener('click', toggleFullScreen);
    document.getElementById('rewindBtn').addEventListener('click', () => seek(-10));
    document.getElementById('forwardBtn').addEventListener('click', () => seek(10));
    document.getElementById('backBtn').addEventListener('click', () => {
        if (progressInterval) clearInterval(progressInterval);
        window.location.href = '/';
    });
    
    document.getElementById('progressBar').addEventListener('click', (e) => {
        const rect = document.getElementById('progressBar').getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        seekToPercent(pos);
        showControls();
    });
    
    document.addEventListener('fullscreenchange', handleFullScreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullScreenChange);
    
    // ============ VIDEONI TEZ KORISH ============
    loadVideoFast();
</script>
</body>
</html>
