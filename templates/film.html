<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Film tomosha qilish</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="theme-color" content="#667eea">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

        .film-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .controls-overlay,
        .video-wrapper:active .controls-overlay,
        .controls-overlay.show {
            opacity: 1;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            pointer-events: auto;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .control-btn:active { transform: scale(0.95); }
        .play-pause-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .progress-container {
            padding: 0 10px;
            pointer-events: auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
        }

        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: white;
            font-size: 0.7rem;
            font-family: monospace;
        }

        .film-info {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 70px 20px 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .film-info,
        .film-info.show {
            opacity: 1;
        }

        .film-title {
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .film-desc {
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
        }

        .film-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .film-loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(220,53,69,0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 0.8rem;
            z-index: 200;
            transform: translateY(100px);
            transition: transform 0.3s ease;
        }

        .error-message.show {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .control-btn { width: 40px; height: 40px; font-size: 1rem; }
            .play-pause-btn { width: 50px; height: 50px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="film-loading" id="filmLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text">🎬 Film yuklanmoqda...</div>
</div>

<div class="film-container">
    <div class="back-btn" id="backBtn">
        <i class="fas fa-arrow-left"></i>
    </div>
    
    <div class="video-wrapper" id="videoWrapper">
        <video id="videoPlayer" src="" preload="metadata"></video>
        
        <div class="controls-overlay" id="controlsOverlay">
            <div class="control-buttons">
                <div class="control-btn" id="rewindBtn">
                    <i class="fas fa-backward"></i>
                </div>
                <div class="control-btn play-pause-btn" id="playPauseBtn">
                    <i class="fas fa-play"></i>
                </div>
                <div class="control-btn" id="forwardBtn">
                    <i class="fas fa-forward"></i>
                </div>
                <div class="control-btn" id="fullscreenBtn">
                    <i class="fas fa-expand"></i>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </div>
        
        <div class="film-info" id="filmInfo">
            <div class="film-title" id="filmTitle">Loading...</div>
            <div class="film-desc" id="filmDesc"></div>
        </div>
    </div>
</div>

<div class="error-message" id="errorMessage">
    <i class="fas fa-exclamation-triangle"></i> Video yuklashda xatolik
</div>

<script>
    // ============ FILM MA'LUMOTLARI ============
    const filmData = {{ film | tojson | safe }};
    let isPlaying = false;
    let controlsTimeout = null;
    let isFullScreen = false;
    
    const video = document.getElementById('videoPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const rewindBtn = document.getElementById('rewindBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const backBtn = document.getElementById('backBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFilled = document.getElementById('progressFilled');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const loadingOverlay = document.getElementById('filmLoading');
    const errorMsg = document.getElementById('errorMessage');
    
    // ============ VIDEO SOURCENI OLISH ============
    let videoUrl = '';
    let isYouTube = false;
    let youTubeId = '';
    
    // YouTube ID ni ajratish
    function extractYouTubeId(url) {
        if (!url) return null;
        if (url.includes('youtu.be/')) {
            return url.split('youtu.be/')[1].split('?')[0];
        } else if (url.includes('watch?v=')) {
            return url.split('watch?v=')[1].split('&')[0];
        } else if (url.includes('embed/')) {
            return url.split('embed/')[1].split('?')[0];
        } else if (url.includes('youtube.com')) {
            const match = url.match(/[?&]v=([^&]+)/);
            if (match) return match[1];
        }
        return null;
    }
    
    // Video URL ni aniqlash
    const embedUrl = filmData.embed_url || filmData.video_url || '';
    youTubeId = extractYouTubeId(embedUrl);
    
    if (youTubeId) {
        isYouTube = true;
        videoUrl = `https://www.youtube.com/embed/${youTubeId}?autoplay=1&controls=0&modestbranding=1&showinfo=0&rel=0&playsinline=1`;
        // YouTube uchun video element ishlatilmaydi, iframe kerak. Shuning uchun YouTube bo'lsa boshqa usul
    }
    
    // ============ NATIVE VIDEO PLAYER (MP4 fayllar uchun) ============
    function initNativePlayer() {
        // MP4 yoki boshqa to'g'ridan-to'g'ri video fayl
        let directUrl = embedUrl;
        
        // YouTube bo'lmasa va to'g'ridan-to'g'ri video fayl bo'lsa
        if (!isYouTube && directUrl && (directUrl.includes('.mp4') || directUrl.includes('.m3u8') || directUrl.includes('/stream/'))) {
            video.src = directUrl;
            video.load();
            
            video.addEventListener('loadedmetadata', () => {
                loadingOverlay.classList.add('hide');
                durationSpan.textContent = formatTime(video.duration);
                video.play().catch(e => console.log('Autoplay failed:', e));
                isPlaying = true;
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            });
            
            video.addEventListener('timeupdate', updateProgress);
            video.addEventListener('ended', () => {
                isPlaying = false;
                playPauseBtn.innerHTML = '<i class="fas fa-redo-alt"></i>';
            });
            video.addEventListener('play', () => {
                isPlaying = true;
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            });
            video.addEventListener('pause', () => {
                isPlaying = false;
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            });
            video.addEventListener('error', (e) => {
                loadingOverlay.classList.add('hide');
                showError('Video yuklanmadi!');
            });
        } 
        // YouTube uchun iframe yaratish
        else if (youTubeId) {
            // YouTube uchun iframe yaratish
            const wrapper = document.getElementById('videoWrapper');
            const iframe = document.createElement('iframe');
            iframe.width = '100%';
            iframe.height = '100%';
            iframe.style.border = 'none';
            iframe.style.position = 'absolute';
            iframe.style.top = '0';
            iframe.style.left = '0';
            iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';
            iframe.allowFullscreen = true;
            iframe.src = `https://www.youtube.com/embed/${youTubeId}?autoplay=1&controls=1&modestbranding=1&showinfo=0&rel=0&playsinline=1&enablejsapi=1`;
            
            // Videoni yashirish
            video.style.display = 'none';
            wrapper.appendChild(iframe);
            
            loadingOverlay.classList.add('hide');
            
            // Iframe uchun fullscreen tugmasi
            fullscreenBtn.onclick = () => {
                if (iframe.requestFullscreen) iframe.requestFullscreen();
                else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
            };
            
            playPauseBtn.onclick = () => {
                // YouTube iframe ni boshqarish qiyin, shuning uchun oddiy usul
                alert('YouTube videoda boshqaruv uchun videoning oʻz tugmalaridan foydalaning');
            };
            
            return;
        }
        else {
            loadingOverlay.classList.add('hide');
            showError('Video manzili topilmadi!');
        }
    }
    
    // ============ FULL SCREEN ============
    function toggleFullScreen() {
        const elem = document.getElementById('videoWrapper');
        if (!isFullScreen) {
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
            fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i>';
            isFullScreen = true;
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
            fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i>';
            isFullScreen = false;
        }
    }
    
    function handleFullScreenChange() {
        const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        fullscreenBtn.innerHTML = isFs ? '<i class="fas fa-compress"></i>' : '<i class="fas fa-expand"></i>';
        isFullScreen = isFs;
    }
    
    document.addEventListener('fullscreenchange', handleFullScreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullScreenChange);
    
    // ============ VIDEO CONTROLS ============
    function showControls() {
        const controls = document.getElementById('controlsOverlay');
        const filmInfoDiv = document.getElementById('filmInfo');
        controls.classList.add('show');
        filmInfoDiv.classList.add('show');
        if (controlsTimeout) clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => {
            controls.classList.remove('show');
            filmInfoDiv.classList.remove('show');
        }, 3000);
    }
    
    function togglePlayPause() {
        if (video.paused) {
            video.play();
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            isPlaying = true;
        } else {
            video.pause();
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            isPlaying = false;
        }
    }
    
    function seekRelative(seconds) {
        video.currentTime = Math.min(Math.max(0, video.currentTime + seconds), video.duration);
    }
    
    function updateProgress() {
        const percent = (video.currentTime / video.duration) * 100;
        progressFilled.style.width = percent + '%';
        currentTimeSpan.textContent = formatTime(video.currentTime);
        durationSpan.textContent = formatTime(video.duration);
    }
    
    function formatTime(seconds) {
        if (isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    function showError(message) {
        errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + message;
        errorMsg.classList.add('show');
        setTimeout(() => errorMsg.classList.remove('show'), 5000);
    }
    
    // ============ EVENT LISTENERS ============
    playPauseBtn.addEventListener('click', togglePlayPause);
    fullscreenBtn.addEventListener('click', toggleFullScreen);
    rewindBtn.addEventListener('click', () => seekRelative(-10));
    forwardBtn.addEventListener('click', () => seekRelative(10));
    backBtn.addEventListener('click', () => window.location.href = '/');
    
    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
    });
    
    video.addEventListener('play', () => {
        isPlaying = true;
        playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
    });
    video.addEventListener('pause', () => {
        isPlaying = false;
        playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
    });
    
    const wrapper = document.getElementById('videoWrapper');
    wrapper.addEventListener('mousemove', showControls);
    wrapper.addEventListener('click', showControls);
    wrapper.addEventListener('touchstart', showControls);
    wrapper.addEventListener('dblclick', () => toggleFullScreen());
    
    // ============ KEYBOARD SHORTCUTS ============
    document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Space' || e.key === 'k' || e.key === 'K') {
            e.preventDefault();
            togglePlayPause();
        }
        else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            seekRelative(-10);
        }
        else if (e.key === 'ArrowRight') {
            e.preventDefault();
            seekRelative(10);
        }
        else if (e.key === 'f' || e.key === 'F') {
            e.preventDefault();
            toggleFullScreen();
        }
        showControls();
    });
    
    // ============ FILM MA'LUMOTLARINI KO'RSATISH ============
    document.getElementById('filmTitle').textContent = filmData.sarlavha || filmData.nomi || 'Film';
    document.getElementById('filmDesc').textContent = filmData.tafsilot || filmData.description || '';
    
    // ============ START ============
    initNativePlayer();
    
    setTimeout(() => {
        loadingOverlay.classList.add('hide');
    }, 8000);
</script>
</body>
</html>
