<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinotop | Film tomosha qilish</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <meta name="theme-color" content="#667eea">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            height: 100vh;
            position: fixed;
            width: 100%;
        }

        /* Full screen mode */
        body:fullscreen {
            overflow: hidden !important;
            width: 100% !important;
            height: 100% !important;
        }
        body:-webkit-full-screen {
            overflow: hidden !important;
        }
        body:-moz-full-screen {
            overflow: hidden !important;
        }

        /* Film Container */
        .film-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        /* Video Player */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Full screen mode styles */
        .video-wrapper iframe:-webkit-full-screen {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
        }
        .video-wrapper iframe:fullscreen {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
        }

        /* Controls Overlay */
        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .controls-overlay,
        .video-wrapper:active .controls-overlay,
        .controls-overlay.show {
            opacity: 1;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            pointer-events: auto;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .play-pause-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* Progress Bar */
        .progress-container {
            padding: 0 10px;
            pointer-events: auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: white;
            font-size: 0.7rem;
            font-family: monospace;
        }

        /* Film Info */
        .film-info {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 70px 20px 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-wrapper:hover .film-info,
        .film-info.show {
            opacity: 1;
        }

        .film-title {
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .film-desc {
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            line-height: 1.4;
        }

        /* Back Button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        /* Loading */
        .film-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .film-loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            color: white;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(220,53,69,0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 0.8rem;
            z-index: 200;
            transform: translateY(100px);
            transition: transform 0.3s ease;
        }

        .error-message.show {
            transform: translateY(0);
        }

        /* Telegram Full Screen Fix */
        .telegram-fs-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .telegram-fs-overlay.show {
            display: flex;
        }

        .telegram-fs-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .telegram-fs-close {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10000;
            border: 1px solid rgba(255,255,255,0.3);
        }

        @media (max-width: 768px) {
            .control-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            .play-pause-btn {
                width: 50px;
                height: 50px;
                font-size: 1.3rem;
            }
            .film-title {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="film-loading" id="filmLoading">
    <div class="loading-spinner"></div>
    <div class="loading-text">🎬 Film yuklanmoqda...</div>
</div>

<!-- Telegram Web uchun maxsus full screen overlay -->
<div class="telegram-fs-overlay" id="telegramFsOverlay">
    <div class="telegram-fs-close" id="telegramFsClose">
        <i class="fas fa-times"></i>
    </div>
    <iframe id="telegramFsIframe" allowfullscreen></iframe>
</div>

<div class="film-container" id="filmContainer">
    <a href="/" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>
    
    <div class="video-wrapper" id="videoWrapper">
        <iframe id="videoIframe" 
                allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                allowfullscreen="true"
                webkitallowfullscreen="true"
                mozallowfullscreen="true">
        </iframe>
        
        <!-- Controls -->
        <div class="controls-overlay" id="controlsOverlay">
            <div class="control-buttons">
                <div class="control-btn" id="rewindBtn">
                    <i class="fas fa-backward"></i>
                </div>
                <div class="control-btn play-pause-btn" id="playPauseBtn">
                    <i class="fas fa-play"></i>
                </div>
                <div class="control-btn" id="forwardBtn">
                    <i class="fas fa-forward"></i>
                </div>
                <div class="control-btn" id="fullscreenBtn">
                    <i class="fas fa-expand"></i>
                </div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </div>
        
        <!-- Film Info -->
        <div class="film-info" id="filmInfo">
            <div class="film-title" id="filmTitle">Loading...</div>
            <div class="film-desc" id="filmDesc"></div>
        </div>
    </div>
</div>

<div class="error-message" id="errorMessage">
    <i class="fas fa-exclamation-triangle"></i> Video yuklashda xatolik
</div>

<script>
    // ============ FILM KODINI OLISH ============
    const filmCode = window.location.pathname.split('/').pop();
    
    // ============ TELEGRAM WEB DETEKTSIYA ============
    function isTelegramWeb() {
        const ua = navigator.userAgent;
        return ua.includes('Telegram') || 
               ua.includes('TelegramWeb') ||
               window.location.hostname.includes('telegram.org') ||
               (ua.includes('Android') && ua.includes('Chrome') && !ua.includes('Instagram'));
    }
    
    const IS_TELEGRAM = isTelegramWeb();
    
    // ============ FULL SCREEN FUNCTIONS ============
    let currentVideoUrl = '';
    
    function toggleFullScreen() {
        if (IS_TELEGRAM) {
            // Telegram Web uchun maxsus full screen
            telegramFullScreen();
        } else {
            // Oddiy browser full screen
            browserFullScreen();
        }
    }
    
    function browserFullScreen() {
        const iframe = document.getElementById('videoIframe');
        
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) {
                iframe.msRequestFullscreen();
            } else if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            document.getElementById('fullscreenBtn').innerHTML = '<i class="fas fa-compress"></i>';
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
            document.getElementById('fullscreenBtn').innerHTML = '<i class="fas fa-expand"></i>';
        }
    }
    
    function telegramFullScreen() {
        const iframe = document.getElementById('videoIframe');
        const currentSrc = iframe.src;
        currentVideoUrl = currentSrc;
        
        const overlay = document.getElementById('telegramFsOverlay');
        const fsIframe = document.getElementById('telegramFsIframe');
        
        // Current video URL ni saqlash
        fsIframe.src = currentSrc;
        overlay.classList.add('show');
        
        // Body scroll ni bloklash
        document.body.style.overflow = 'hidden';
    }
    
    function closeTelegramFullScreen() {
        const overlay = document.getElementById('telegramFsOverlay');
        const fsIframe = document.getElementById('telegramFsIframe');
        
        fsIframe.src = 'about:blank';
        overlay.classList.remove('show');
        
        // Body scroll ni qayta tiklash
        document.body.style.overflow = '';
    }
    
    // Full screen change event
    document.addEventListener('fullscreenchange', () => {
        const isFs = !!document.fullscreenElement;
        const btn = document.getElementById('fullscreenBtn');
        if (btn) {
            btn.innerHTML = isFs ? '<i class="fas fa-compress"></i>' : '<i class="fas fa-expand"></i>';
        }
    });
    
    document.addEventListener('webkitfullscreenchange', () => {
        const isFs = !!document.webkitFullscreenElement;
        const btn = document.getElementById('fullscreenBtn');
        if (btn) {
            btn.innerHTML = isFs ? '<i class="fas fa-compress"></i>' : '<i class="fas fa-expand"></i>';
        }
    });
    
    // ============ VIDEO CONTROLS ============
    function showControls() {
        const controls = document.getElementById('controlsOverlay');
        const filmInfo = document.getElementById('filmInfo');
        controls.classList.add('show');
        filmInfo.classList.add('show');
        
        if (window.controlsTimeout) clearTimeout(window.controlsTimeout);
        window.controlsTimeout = setTimeout(() => {
            controls.classList.remove('show');
            filmInfo.classList.remove('show');
        }, 3000);
    }
    
    function togglePlayPause() {
        const iframe = document.getElementById('videoIframe');
        if (iframe && iframe.contentWindow) {
            if (window.isPlaying) {
                iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
                window.isPlaying = false;
            } else {
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
                window.isPlaying = true;
            }
        }
    }
    
    function seek(seconds) {
        const iframe = document.getElementById('videoIframe');
        if (iframe && iframe.contentWindow) {
            iframe.contentWindow.postMessage(JSON.stringify({
                event: 'command',
                func: 'seekTo',
                args: [seconds, true]
            }), '*');
        }
    }
    
    // ============ FETCH FILM DATA ============
    async function loadFilm() {
        const loading = document.getElementById('filmLoading');
        
        try {
            // API orqali film ma'lumotlarini olish
            const response = await fetch(`/api/film/${filmCode}`);
            const data = await response.json();
            
            if (data.exists && data.film) {
                displayFilm(data.film);
            } else {
                throw new Error('Film not found');
            }
        } catch (error) {
            console.error('Error loading film:', error);
            loading.classList.add('hide');
            showError('Film topilmadi!');
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }
    }
    
    function displayFilm(filmData) {
        const loading = document.getElementById('filmLoading');
        const iframe = document.getElementById('videoIframe');
        const title = document.getElementById('filmTitle');
        const desc = document.getElementById('filmDesc');
        
        // Set film info
        title.textContent = filmData.sarlavha || filmData.nomi || 'Film';
        desc.textContent = filmData.tafsilot || filmData.description || '';
        
        // Build video URL
        let videoUrl = filmData.video_url || filmData.embed_url;
        
        // Add autoplay and other parameters
        if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be')) {
            let videoId = '';
            if (videoUrl.includes('youtu.be/')) {
                videoId = videoUrl.split('youtu.be/')[1].split('?')[0];
            } else if (videoUrl.includes('watch?v=')) {
                videoId = videoUrl.split('watch?v=')[1].split('&')[0];
            } else if (videoUrl.includes('embed/')) {
                videoId = videoUrl.split('embed/')[1].split('?')[0];
            }
            
            videoUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&controls=0&modestbranding=1&showinfo=0&rel=0&playsinline=1&enablejsapi=1`;
        } else if (videoUrl.includes('vimeo.com')) {
            let videoId = videoUrl.split('vimeo.com/')[1].split('?')[0];
            videoUrl = `https://player.vimeo.com/video/${videoId}?autoplay=1&controls=0&playsinline=1`;
        }
        
        // Set iframe src
        iframe.src = videoUrl;
        
        // Hide loading after video loads
        iframe.onload = () => {
            setTimeout(() => {
                loading.classList.add('hide');
                window.isPlaying = true;
                document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
            }, 500);
        };
        
        iframe.onerror = () => {
            loading.classList.add('hide');
            showError('Video yuklanmadi!');
        };
        
        // Show controls on activity
        const wrapper = document.getElementById('videoWrapper');
        wrapper.addEventListener('mousemove', showControls);
        wrapper.addEventListener('click', showControls);
        wrapper.addEventListener('touchstart', showControls);
        
        // Double click for full screen
        wrapper.addEventListener('dblclick', (e) => {
            e.preventDefault();
            toggleFullScreen();
        });
        
        // Hide loading after timeout
        setTimeout(() => {
            loading.classList.add('hide');
        }, 5000);
    }
    
    function showError(message) {
        const errorMsg = document.getElementById('errorMessage');
        errorMsg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + message;
        errorMsg.classList.add('show');
        setTimeout(() => {
            errorMsg.classList.remove('show');
        }, 3000);
    }
    
    // ============ KEYBOARD CONTROLS ============
    document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Space') {
            e.preventDefault();
            togglePlayPause();
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            seek(-10);
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            seek(10);
        } else if (e.key === 'f' || e.key === 'F') {
            e.preventDefault();
            toggleFullScreen();
        } else if (e.key === 'Escape') {
            if (IS_TELEGRAM) {
                const overlay = document.getElementById('telegramFsOverlay');
                if (overlay.classList.contains('show')) {
                    closeTelegramFullScreen();
                }
            }
        }
        showControls();
    });
    
    // ============ TELEGRAM WEB SPECIFIC ============
    if (IS_TELEGRAM) {
        console.log('Telegram Web detected - using custom full screen');
        
        // Add Telegram specific styles
        const style = document.createElement('style');
        style.textContent = `
            .video-wrapper iframe {
                pointer-events: auto !important;
            }
            .control-btn {
                background: rgba(0,0,0,0.7) !important;
            }
        `;
        document.head.appendChild(style);
        
        // Close button event
        document.getElementById('telegramFsClose').addEventListener('click', closeTelegramFullScreen);
        
        // Show instruction for Telegram users
        setTimeout(() => {
            const instruction = document.createElement('div');
            instruction.style.cssText = 'position:fixed;bottom:100px;left:20px;right:20px;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);padding:12px;border-radius:12px;color:white;font-size:0.75rem;text-align:center;z-index:1000';
            instruction.innerHTML = '⛶ Full screen uchun ikki marta bosing yoki F tugmasini bosing';
            document.body.appendChild(instruction);
            setTimeout(() => instruction.remove(), 4000);
        }, 1000);
    }
    
    // ============ LISTEN FOR YOUTUBE PLAYER EVENTS ============
    window.addEventListener('message', (event) => {
        if (event.data === 'requestFullScreen') {
            toggleFullScreen();
        }
    });
    
    // Progress bar click
    const progressBar = document.getElementById('progressBar');
    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        seek(pos * 100);
    });
    
    // ============ INITIALIZE ============
    document.getElementById('playPauseBtn').addEventListener('click', togglePlayPause);
    document.getElementById('fullscreenBtn').addEventListener('click', toggleFullScreen);
    document.getElementById('rewindBtn').addEventListener('click', () => seek(-10));
    document.getElementById('forwardBtn').addEventListener('click', () => seek(10));
    
    window.isPlaying = false;
    
    // Start loading film
    loadFilm();
</script>
</body>
</html>
