<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ film.nomi }} | Kinotop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            position: fixed;
            width: 100%;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
            text-decoration: none;
        }
        .back-btn:active { background: rgba(255,255,255,0.2); }

        /* Container */
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 60px;
        }

        /* Video Wrapper */
        .video-wrapper {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* YouTube iframe - barcha logo va tugmalarni yashirish */
        .youtube-player {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Custom Fullscreen Button */
        .custom-fullscreen {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0;
            animation: fadeIn 0.5s forwards 1s;
        }
        .custom-fullscreen:active { 
            transform: scale(0.95); 
            background: rgba(102,126,234,0.8);
        }

        /* Video Info */
        .info {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }
        .info h1 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: white;
        }
        .film-code {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 3px 10px;
            border-radius: 20px;
            color: white;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .description {
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            margin-top: 8px;
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
            z-index: 2000;
            transition: opacity 0.3s;
        }
        .loading-overlay.hide { opacity: 0; visibility: hidden; }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102,126,234,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-text { color: white; font-size: 0.9rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Fullscreen mode */
        .video-wrapper:-webkit-full-screen {
            width: 100%;
            height: 100%;
        }
        .video-wrapper:fullscreen {
            width: 100%;
            height: 100%;
        }
        .video-wrapper:fullscreen .youtube-player {
            height: 100%;
        }
        .video-wrapper:fullscreen .custom-fullscreen {
            bottom: 30px;
            right: 30px;
        }

        @media (max-width: 768px) {
            .custom-fullscreen { width: 42px; height: 42px; font-size: 1.1rem; }
            .info h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">🎬 Video tayyorlanmoqda...</div>
</div>

<div class="header">
    <a href="/" class="logo">
        <i class="fas fa-film"></i>
        <span>KINOTOP</span>
    </a>
    <a href="/" class="back-btn">
        <i class="fas fa-arrow-left"></i> Chiqish
    </a>
</div>

<div class="container">
    <div class="video-wrapper" id="videoWrapper">
        <!-- YouTube iframe - logo va tugmalar yashirilgan -->
        <iframe 
            id="youtubeFrame"
            class="youtube-player"
            src="{{ film.embed_url }}&modestbranding=1&showinfo=0&controls=0&rel=0&iv_load_policy=3&fs=0&disablekb=1"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
            allowfullscreen="true"
            webkitallowfullscreen="true"
            mozallowfullscreen="true">
        </iframe>
        
        <!-- Custom Fullscreen Button -->
        <button class="custom-fullscreen" id="fullscreenBtn">
            <i class="fas fa-expand"></i>
        </button>
    </div>

    <div class="info">
        <h1>{{ film.nomi }}</h1>
        <div class="film-code">
            <i class="fas fa-key"></i> Kod: {{ film.kod }}
        </div>
        <div class="description">
            {{ film.tafsilot if film.tafsilot else "Bu film haqida ma'lumot yo'q" }}
        </div>
    </div>
</div>

<script>
    const loadingOverlay = document.getElementById('loadingOverlay');
    const videoWrapper = document.getElementById('videoWrapper');
    const youtubeFrame = document.getElementById('youtubeFrame');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    // ============ LOADING ============
    youtubeFrame.addEventListener('load', () => {
        setTimeout(() => {
            loadingOverlay.classList.add('hide');
        }, 500);
    });
    
    setTimeout(() => {
        loadingOverlay.classList.add('hide');
    }, 3000);

    // ============ FULLSCREEN (Telegram Web uchun tuzatilgan) ============
    function enterFullscreen() {
        const elem = videoWrapper;
        
        // Standart fullscreen API
        if (elem.requestFullscreen) {
            elem.requestFullscreen().catch(err => {
                console.log('Fullscreen error:', err);
                fallbackFullscreen();
            });
        }
        else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        }
        else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
        }
        else {
            fallbackFullscreen();
        }
    }
    
    function fallbackFullscreen() {
        // Telegram web uchun maxsus: iframe ni to'g'ridan-to'g'ri kattalashtirish
        const iframe = youtubeFrame;
        
        // Iframe ni vaqtincha oyna sifatida ochish
        const currentSrc = iframe.src;
        
        // Modal oyna yaratish
        const modal = document.createElement('div');
        modal.style.position = 'fixed';
        modal.style.top = '0';
        modal.style.left = '0';
        modal.style.width = '100%';
        modal.style.height = '100%';
        modal.style.backgroundColor = '#000';
        modal.style.zIndex = '9999';
        modal.style.display = 'flex';
        modal.style.alignItems = 'center';
        modal.style.justifyContent = 'center';
        
        const newIframe = document.createElement('iframe');
        newIframe.style.width = '100%';
        newIframe.style.height = '100%';
        newIframe.style.border = 'none';
        newIframe.src = currentSrc;
        newIframe.allow = 'accelerometer; autoplay; fullscreen';
        
        const closeBtn = document.createElement('button');
        closeBtn.innerHTML = '✕';
        closeBtn.style.position = 'absolute';
        closeBtn.style.top = '20px';
        closeBtn.style.right = '20px';
        closeBtn.style.background = 'rgba(0,0,0,0.7)';
        closeBtn.style.color = 'white';
        closeBtn.style.border = 'none';
        closeBtn.style.width = '44px';
        closeBtn.style.height = '44px';
        closeBtn.style.borderRadius = '50%';
        closeBtn.style.fontSize = '1.5rem';
        closeBtn.style.cursor = 'pointer';
        closeBtn.style.zIndex = '10000';
        
        closeBtn.onclick = () => {
            document.body.removeChild(modal);
        };
        
        modal.appendChild(newIframe);
        modal.appendChild(closeBtn);
        document.body.appendChild(modal);
    }
    
    // Fullscreen tugmasi bosilganda
    fullscreenBtn.addEventListener('click', enterFullscreen);
    
    // Double click fullscreen
    youtubeFrame.addEventListener('dblclick', enterFullscreen);
    videoWrapper.addEventListener('dblclick', enterFullscreen);
    
    // ============ TELEGRAM WEB DETEKSI ============
    function isTelegramWeb() {
        const ua = navigator.userAgent || '';
        return ua.includes('Telegram') && !ua.includes('Android') && !ua.includes('iPhone');
    }
    
    if (isTelegramWeb()) {
        // Telegram web da fullscreen tugmasini boshqa usul bilan ishlatish
        fullscreenBtn.addEventListener('click', () => {
            // Iframe src ni vaqtincha o'zgartirib qayta tiklash
            const src = youtubeFrame.src;
            youtubeFrame.src = '';
            setTimeout(() => {
                youtubeFrame.src = src;
            }, 100);
            setTimeout(() => {
                fallbackFullscreen();
            }, 200);
        });
    }
    
    // ============ YOUTUBE LOGO YASHIRISH QO'SHIMCHA ============
    // YouTube iframe ga CSS orqali yashirish
    const style = document.createElement('style');
    style.textContent = `
        .youtube-player {
            pointer-events: auto;
        }
    `;
    document.head.appendChild(style);
</script>
</body>
</html>
