<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ film.nomi }} | Kinotop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .download-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 70px 15px 30px;
        }

        /* Video Wrapper */
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Custom Video Controls for YouTube */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 15px 20px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .video-wrapper:hover .custom-controls {
            opacity: 1;
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 12px;
            position: relative;
        }

        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            position: relative;
        }

        /* Controls Row */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .controls-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Buttons */
        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Time Display */
        .time-display {
            color: white;
            font-size: 0.85rem;
            font-family: monospace;
        }

        /* Volume Slider */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 80px;
            height: 3px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Speed Select */
        .speed-select {
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* Info Section */
        .info {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }
        .info h1 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .film-code {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }
        .details {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .detail {
            background: #2a2a2a;
            padding: 10px 15px;
            border-radius: 12px;
        }
        .detail-label {
            color: #aaa;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .detail-value {
            color: white;
            font-size: 0.9rem;
            margin-top: 3px;
        }
        .description {
            color: #ccc;
            line-height: 1.5;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }

        /* Loading */
        .loading-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            z-index: 20;
            display: none;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Fullscreen */
        .video-wrapper:fullscreen {
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }

        .video-wrapper:fullscreen iframe {
            width: 100%;
            height: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 60px 12px 20px; }
            .info h1 { font-size: 1.2rem; }
            .controls-left { gap: 8px; }
            .controls-right { gap: 8px; }
            .ctrl-btn { width: 30px; height: 30px; font-size: 1rem; }
            .volume-slider { width: 50px; }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="/">🎬 KINOTOP</a>
    <button class="download-btn" id="downloadBtn" style="display: none;">📥 Yuklab olish</button>
</div>

<div class="container">
    <div class="video-wrapper" id="videoWrapper">
        <div class="loading-indicator" id="loadingIndicator"></div>
        <iframe id="youtubeIframe" 
                src=""
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                allowfullscreen>
        </iframe>
        
        <!-- Custom Controls for YouTube -->
        <div class="custom-controls" id="customControls">
            <!-- Progress Bar -->
            <div class="progress-bar" id="progressBar">
                <div class="progress-filled" id="progressFilled"></div>
            </div>
            
            <div class="controls-row">
                <div class="controls-left">
                    <!-- Play/Pause -->
                    <button class="ctrl-btn" id="playPauseBtn">
                        <i class="fas fa-play"></i>
                    </button>
                    
                    <!-- Volume -->
                    <div class="volume-container">
                        <button class="ctrl-btn" id="volumeBtn">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
                    </div>
                    
                    <!-- Time -->
                    <div class="time-display">
                        <span id="currentTime">00:00</span> / <span id="duration">00:00</span>
                    </div>
                </div>
                
                <div class="controls-right">
                    <!-- Playback Speed -->
                    <select class="speed-select" id="speedSelect">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>
                    
                    <!-- Fullscreen -->
                    <button class="ctrl-btn" id="fullscreenBtn">
                        <i class="fas fa-expand"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="info">
        <h1>{{ film.nomi }}</h1>
        <div class="film-code">🔑 Kod: {{ film.kod }}</div>
        
        <div class="details">
            <div class="detail">
                <div class="detail-label">Yil</div>
                <div class="detail-value">{{ film.yil if film.yil else "Noma'lum" }}</div>
            </div>
            <div class="detail">
                <div class="detail-label">Janr</div>
                <div class="detail-value">{{ film.janr if film.janr else "Noma'lum" }}</div>
            </div>
        </div>
        
        <div class="description">
            {{ film.tafsilot if film.tafsilot else "Ma'lumot yo'q" }}
        </div>
        
        <a href="/" class="back-btn">← Bosh sahifa</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
<script>
    // YouTube Player API
    let player = null;
    let isPlaying = false;
    let controlsTimeout = null;
    let isFullScreen = false;
    
    // Get YouTube video ID from embed URL
    function getYouTubeId(url) {
        if (!url) return null;
        if (url.includes('youtu.be/')) {
            return url.split('youtu.be/')[1].split('?')[0];
        } else if (url.includes('youtube.com/embed/')) {
            return url.split('youtube.com/embed/')[1].split('?')[0];
        } else if (url.includes('watch?v=')) {
            return url.split('watch?v=')[1].split('&')[0];
        }
        return null;
    }
    
    // Initialize YouTube player
    function initYouTubePlayer() {
        const videoId = getYouTubeId('{{ film.embed_url if film.embed_url else film.video_url }}');
        
        if (!videoId) {
            document.getElementById('loadingIndicator').style.display = 'none';
            alert('Video URL not found!');
            return;
        }
        
        // Load YouTube Iframe API
        if (!window.YT) {
            const tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            
            window.onYouTubeIframeAPIReady = function() {
                createPlayer(videoId);
            };
        } else {
            createPlayer(videoId);
        }
    }
    
    function createPlayer(videoId) {
        const wrapper = document.getElementById('videoWrapper');
        const iframe = document.getElementById('youtubeIframe');
        
        player = new YT.Player('youtubeIframe', {
            height: '100%',
            width: '100%',
            videoId: videoId,
            playerVars: {
                'autoplay': 1,
                'controls': 0,
                'modestbranding': 1,
                'rel': 0,
                'showinfo': 0,
                'playsinline': 1,
                'enablejsapi': 1,
                'origin': window.location.origin
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange,
                'onError': onPlayerError
            }
        });
    }
    
    function onPlayerReady(event) {
        document.getElementById('loadingIndicator').style.display = 'none';
        event.target.playVideo();
        isPlaying = true;
        document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
        
        // Get duration
        const duration = event.target.getDuration();
        document.getElementById('duration').textContent = formatTime(duration);
        
        // Update time periodically
        setInterval(() => {
            if (player && player.getCurrentTime) {
                const currentTime = player.getCurrentTime();
                document.getElementById('currentTime').textContent = formatTime(currentTime);
                const duration = player.getDuration();
                const percent = (currentTime / duration) * 100;
                document.getElementById('progressFilled').style.width = percent + '%';
            }
        }, 1000);
    }
    
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            isPlaying = true;
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
            document.getElementById('loadingIndicator').style.display = 'none';
        } else if (event.data === YT.PlayerState.PAUSED) {
            isPlaying = false;
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
        } else if (event.data === YT.PlayerState.BUFFERING) {
            document.getElementById('loadingIndicator').style.display = 'block';
        } else {
            document.getElementById('loadingIndicator').style.display = 'none';
        }
    }
    
    function onPlayerError(event) {
        console.error('YouTube error:', event.data);
        document.getElementById('loadingIndicator').style.display = 'none';
        alert('Video yuklashda xatolik yuz berdi!');
    }
    
    // Format time
    function formatTime(seconds) {
        if (isNaN(seconds)) return '00:00';
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);
        if (hrs > 0) {
            return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    // Play/Pause
    function togglePlay() {
        if (player) {
            if (isPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }
    }
    
    // Seek
    function seek(seconds) {
        if (player && player.getCurrentTime) {
            const currentTime = player.getCurrentTime();
            player.seekTo(currentTime + seconds, true);
        }
    }
    
    // Progress bar click
    const progressBar = document.getElementById('progressBar');
    progressBar.addEventListener('click', (e) => {
        if (player) {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            const duration = player.getDuration();
            player.seekTo(pos * duration, true);
        }
    });
    
    // Volume
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeBtn = document.getElementById('volumeBtn');
    
    volumeSlider.addEventListener('input', () => {
        if (player) {
            player.setVolume(volumeSlider.value);
            updateVolumeIcon(volumeSlider.value);
        }
    });
    
    function updateVolumeIcon(volume) {
        if (volume == 0) {
            volumeBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
        } else if (volume < 50) {
            volumeBtn.innerHTML = '<i class="fas fa-volume-down"></i>';
        } else {
            volumeBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        }
    }
    
    volumeBtn.addEventListener('click', () => {
        if (player) {
            const currentVolume = player.getVolume();
            if (currentVolume > 0) {
                player.setVolume(0);
                volumeSlider.value = 0;
                updateVolumeIcon(0);
            } else {
                player.setVolume(100);
                volumeSlider.value = 100;
                updateVolumeIcon(100);
            }
        }
    });
    
    // Playback speed
    const speedSelect = document.getElementById('speedSelect');
    speedSelect.addEventListener('change', () => {
        if (player) {
            player.setPlaybackRate(parseFloat(speedSelect.value));
        }
    });
    
    // Fullscreen
    const wrapper = document.getElementById('videoWrapper');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    
    function toggleFullScreen() {
        if (!isFullScreen) {
            if (wrapper.requestFullscreen) {
                wrapper.requestFullscreen();
            } else if (wrapper.webkitRequestFullscreen) {
                wrapper.webkitRequestFullscreen();
            } else if (wrapper.msRequestFullscreen) {
                wrapper.msRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
        }
    }
    
    fullscreenBtn.addEventListener('click', toggleFullScreen);
    
    document.addEventListener('fullscreenchange', () => {
        isFullScreen = !!document.fullscreenElement;
        fullscreenBtn.innerHTML = isFullScreen ? '<i class="fas fa-compress"></i>' : '<i class="fas fa-expand"></i>';
    });
    
    // Show/hide controls
    const customControls = document.getElementById('customControls');
    
    function showControls() {
        customControls.style.opacity = '1';
        if (controlsTimeout) clearTimeout(controlsTimeout);
        controlsTimeout = setTimeout(() => {
            if (isPlaying) {
                customControls.style.opacity = '0';
            }
        }, 3000);
    }
    
    wrapper.addEventListener('mousemove', showControls);
    wrapper.addEventListener('click', showControls);
    wrapper.addEventListener('touchstart', showControls);
    wrapper.addEventListener('dblclick', (e) => {
        e.preventDefault();
        toggleFullScreen();
    });
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            togglePlay();
            showControls();
        } else if (e.code === 'ArrowLeft') {
            e.preventDefault();
            seek(-10);
            showControls();
        } else if (e.code === 'ArrowRight') {
            e.preventDefault();
            seek(10);
            showControls();
        } else if (e.code === 'KeyF') {
            e.preventDefault();
            toggleFullScreen();
        } else if (e.code === 'ArrowUp') {
            e.preventDefault();
            if (player) {
                let vol = player.getVolume() + 10;
                vol = Math.min(100, vol);
                player.setVolume(vol);
                volumeSlider.value = vol;
                updateVolumeIcon(vol);
            }
        } else if (e.code === 'ArrowDown') {
            e.preventDefault();
            if (player) {
                let vol = player.getVolume() - 10;
                vol = Math.max(0, vol);
                player.setVolume(vol);
                volumeSlider.value = vol;
                updateVolumeIcon(vol);
            }
        }
    });
    
    // Initialize
    document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
    
    // Load YouTube API and player
    initYouTubePlayer();
    
    // Download button (hide for YouTube)
    const downloadBtn = document.getElementById('downloadBtn');
    if (downloadBtn) {
        downloadBtn.style.display = 'none';
    }
</script>
</body>
</html>
